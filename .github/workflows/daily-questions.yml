name: Generate Daily Questions

on:
  # 05:05 UTC = 00:05 ET (EST) / 01:05 ET (EDT)
  # Runs just after ET midnight so day counter is always correct.
  # Note: during EDT (Mar–Nov) this is 01:05 ET, during EST (Nov–Mar) it's 00:05 ET.
  # Both are well past ET midnight, so dayIndex will always be correct.
  schedule:
    - cron: '5 5 * * *'

  # Allow manual trigger + optional reroll
  workflow_dispatch:
    inputs:
      reroll:
        description: 'Set a reroll nonce (any string) to force a fresh set'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily questions
        env:
          REROLL_NONCE: ${{ github.event.inputs.reroll }}
        run: node scripts/generate-daily.js

      - name: Commit and push daily.json + used.json
        run: |
          git config user.name  "Daily Five Bot"
          git config user.email "bot@playdailyfive.com"
          git add daily.json used.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily questions: $(date -u +'%Y-%m-%d')"
          git push
